<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Subscription Manager</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            padding: 40px;
            text-align: center;
        }
        .auth-container h2 {
            margin-bottom: 20px;
            color: var(--text-main);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .auth-form input {
            padding: 15px;
            font-size: 15px;
        }
        .auth-toggle {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .auth-toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        .auth-toggle a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: var(--danger);
            font-size: 14px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="center-title">Subscription Track</h1>
        </header>

        <div class="auth-container" id="login-view">
            <h2>Welcome Back</h2>
            <div id="login-error" class="error-message"></div>
            <form class="auth-form" id="login-form">
                <input type="email" id="login-email" placeholder="Email Address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
            <p class="auth-toggle">Don't have an account? <a onclick="toggleAuthView('register')">Sign Up</a></p>
        </div>

        <div class="auth-container" id="register-view" style="display: none;">
            <h2>Create Account</h2>
            <div id="register-error" class="error-message"></div>
            <form class="auth-form" id="register-form">
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="email" id="register-email" placeholder="Email Address" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
            <p class="auth-toggle">Already have an account? <a onclick="toggleAuthView('login')">Sign In</a></p>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
